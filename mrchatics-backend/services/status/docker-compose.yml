version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: status_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: status_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - status-network

  status-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: status_service_app
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: status_service
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - status-network

networks:
  status-network:
    driver: bridge

volumes:
  postgres_data:
